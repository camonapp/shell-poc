<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>PostMessage Tester — Parent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #0d0d0d; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; }
    header { padding: 12px 16px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 14px; color: #aaa; }
    #status { font-size: 12px; padding: 4px 10px; border-radius: 4px; background: #2a2a2a; color: #666; }
    #status.received { background: #0f3d1a; color: #4caf50; }
    main { display: flex; flex: 1; overflow: hidden; }
    #iframe-wrap { flex: 1; padding: 12px; }
    iframe { width: 100%; height: 100%; border: 1px solid #333; border-radius: 6px; background: #000; }
    #panel { width: 380px; display: flex; flex-direction: column; border-left: 1px solid #2a2a2a; }
    #panel h2 { font-size: 12px; color: #666; padding: 10px 14px; border-bottom: 1px solid #2a2a2a; text-transform: uppercase; letter-spacing: 1px; }
    #log { flex: 1; overflow-y: auto; padding: 10px 14px; font-size: 12px; line-height: 1.6; }
    .entry { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #1e1e1e; }
    .entry .time { color: #555; font-size: 10px; }
    .entry .origin { color: #888; }
    .entry .data { color: #4caf50; white-space: pre-wrap; word-break: break-all; }
    .empty { color: #444; font-style: italic; }
    #controls { padding: 10px 14px; border-top: 1px solid #2a2a2a; display: flex; flex-direction: column; gap: 8px; }
    #controls label { font-size: 11px; color: #666; }
    #controls input { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; padding: 6px 8px; border-radius: 4px; font-family: monospace; font-size: 12px; width: 100%; }
    #controls button { background: #222; border: 1px solid #444; color: #ccc; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: monospace; }
    #controls button:hover { background: #333; }
    #clear { color: #c0392b; border-color: #5a1a1a; }
    #clear:hover { background: #2a0d0d; }
  </style>
</head>
<body>

<header>
  <h1>PostMessage Tester — Parent</h1>
  <span id="status">esperando mensajes...</span>
</header>

<main>
  <div id="iframe-wrap">
    <iframe id="frame" src="http://localhost:5173/?outcome=success"></iframe>
  </div>

  <div id="panel">
    <h2>Mensajes recibidos</h2>
    <div id="log"><span class="empty">Ningún mensaje aún.</span></div>

    <div id="controls">
      <label>URL del iframe</label>
      <input id="url-input" value="http://localhost:5173/?outcome=success" />
      <button onclick="reloadFrame()">Recargar iframe</button>
      <button id="clear" onclick="clearLog()">Limpiar log</button>
    </div>
  </div>
</main>

<script>
  const log = document.getElementById('log')
  const status = document.getElementById('status')
  let count = 0

  window.addEventListener('message', (e) => {
    count++
    status.textContent = `${count} mensaje(s) recibido(s)`
    status.className = 'received'

    if (log.querySelector('.empty')) log.innerHTML = ''

    const entry = document.createElement('div')
    entry.className = 'entry'
    entry.innerHTML = `
      <div class="time">${new Date().toISOString()}</div>
      <div class="origin">origin: ${e.origin}</div>
      <div class="data">${JSON.stringify(e.data, null, 2)}</div>
    `
    log.prepend(entry)
    console.log('[postMessage]', { origin: e.origin, data: e.data })
  })

  function reloadFrame() {
    const input = document.getElementById('url-input').value.trim()
    document.getElementById('frame').src = input
  }

  function clearLog() {
    log.innerHTML = '<span class="empty">Ningún mensaje aún.</span>'
    count = 0
    status.textContent = 'esperando mensajes...'
    status.className = ''
  }
</script>

</body>
</html>
